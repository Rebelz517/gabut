<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Our Love Story 💖</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- MUSIC -->
    <audio id="bgMusic" autoplay loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <!-- FLOWER BLOOM -->
    <div class="bloom-container">
      <div class="flower"></div>
    </div>

    <!-- PETALS -->
    <div class="petals"></div>

    <!-- HERO -->
    <section class="hero">
      <div class="glass hero-box">
        <h1 class="glow-text">Our Love Story</h1>
        <p>Every moment with you is my favorite memory 💕</p>
      </div>
    </section>

    <!-- ALBUM -->
    <section class="album-section">
      <h2 class="section-title">Our Memories 📸</h2>
      <div class="album">
        <div class="photo">
          <img src="1.jpeg" />
        </div>
        <div class="photo">
          <img src="2.jpeg" />
        </div>
        <div class="photo">
          <img src="5.jpeg" />
        </div>
        <div class="photo">
          <img src="4.jpeg" />
        </div>
      </div>
    </section>

    <!-- LOVE STORY -->
    <section class="story">
      <h2 class="section-title">Our Journey 💞</h2>
      <div class="timeline">
        <div class="card">✨ First Meet</div>
        <div class="card">💬 First Chat</div>
        <div class="card">💖 First Love</div>
        <div class="card">💍 Forever Together</div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <p>Made with ❤️ for you</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
